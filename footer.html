<div id="player" class="hidden">
  <div class="player-info">
    <div class="player-title" id="player-title">—</div>
    <div class="player-meta" id="player-meta"></div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-shuffle" title="Shuffle" onclick="toggleShuffle()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-prev" title="Previous" onclick="prevTrack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause" onclick="togglePlay()">
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-next" title="Next" onclick="nextTrack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-repeat" title="Repeat" onclick="toggleRepeat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
  </div>
  <div class="player-progress">
    <div class="progress-bar-wrap" id="progress-wrap" onclick="seekTo(event)">
      <div class="progress-bar-fill" id="progress-fill"></div>
      <div class="progress-thumb" id="progress-thumb"></div>
    </div>
    <div class="progress-times">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>
  <div class="volume-wrap">
    <svg class="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path id="vol-med" d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path id="vol-high" d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    <input type="range" min="0" max="1" step="0.02" value="1" id="vol-slider" oninput="setVolume(this.value)" aria-label="Volume">
  </div>
  <audio id="audio-el"></audio>
</div>

<style>
#player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: rgba(10,10,10,0.97);
  border-top: 0.5px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 24px;
  z-index: 1000;
}
#player.hidden { display: none; }
.player-info { min-width: 180px; max-width: 220px; overflow: hidden; }
.player-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #e8e8e8;
}
.player-meta { font-size: 11px; color: #666; margin-top: 3px; }
.player-meta .atmos-tag { color: #c778dd; font-weight: 500; }
.player-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.ctrl-btn {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  padding: 7px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}
.ctrl-btn svg { width: 18px; height: 18px; }
.ctrl-btn:hover { color: #e8e8e8; background: #222; }
.ctrl-btn.active { color: #c778dd; }
.play-btn {
  background: #c778dd !important;
  color: #fff !important;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 0 4px;
}
.play-btn svg { width: 16px; height: 16px; }
.play-btn:hover { background: #a855c0 !important; }
.player-progress { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.progress-bar-wrap {
  position: relative;
  height: 4px;
  background: #2a2a2a;
  border-radius: 2px;
  cursor: pointer;
}
.progress-bar-wrap:hover .progress-thumb { opacity: 1; }
.progress-bar-fill {
  height: 100%;
  background: #c778dd;
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
  transition: width 0.1s linear;
}
.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #c778dd;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  left: 0%;
}
.progress-times { display: flex; justify-content: space-between; font-size: 11px; color: #555; }
.volume-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.vol-icon { width: 16px; height: 16px; color: #555; flex-shrink: 0; }
#vol-slider { width: 80px; accent-color: #c778dd; cursor: pointer; }
audio { display: none; }
tr.hidden-row { display: none; }
tr.active-track td:first-child { border-left: 2px solid #c778dd; }
@media (max-width: 640px) {
  .volume-wrap { display: none; }
  .player-info { min-width: 120px; max-width: 140px; }
}
</style>

<script>
const AUDIO_EXTS = ['mp3','m4a','flac','ogg','wav','aac','opus','wma','aiff','alac'];
let queue = [], currentIndex = -1, shuffle = false, repeat = false, shuffleOrder = [];

const audio = document.getElementById('audio-el');
const player = document.getElementById('player');
const btnPlay = document.getElementById('btn-play');
const iconPlay = document.getElementById('icon-play');
const iconPause = document.getElementById('icon-pause');
const progressFill = document.getElementById('progress-fill');
const progressThumb = document.getElementById('progress-thumb');
const timeCur = document.getElementById('time-cur');
const timeDur = document.getElementById('time-dur');
const playerTitle = document.getElementById('player-title');
const playerMeta = document.getElementById('player-meta');
const btnShuffle = document.getElementById('btn-shuffle');
const btnRepeat = document.getElementById('btn-repeat');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchCount = document.getElementById('search-count');

function fmtTime(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}
function getExt(n) { return n.split('.').pop().toLowerCase(); }
function isAudio(n) { return AUDIO_EXTS.includes(getExt(n)); }

function setPlayIcon(playing) {
  iconPlay.style.display = playing ? 'none' : 'block';
  iconPause.style.display = playing ? 'block' : 'none';
}

function buildQueue() {
  queue = [];
  document.querySelectorAll('tbody tr').forEach(row => {
    const link = row.querySelector('a');
    if (!link) return;
    const href = link.getAttribute('href');
    const name = link.textContent.trim();
    if (!isAudio(name)) return;
    const ext = getExt(name);
    const td = row.querySelector('td');
    if (td) {
      const ind = document.createElement('span');
      ind.className = 'playing-indicator';
      ind.innerHTML = '<svg viewBox="0 0 24 24" fill="#c778dd" width="12" height="12"><rect x="2" y="10" width="3" height="10" rx="1"/><rect x="8" y="6" width="3" height="14" rx="1"/><rect x="14" y="2" width="3" height="18" rx="1"/><rect x="20" y="7" width="3" height="13" rx="1"/></svg>';
      ind.style.cssText = 'display:inline-flex;align-items:center;margin-right:6px;opacity:0;vertical-align:middle;';
      td.insertBefore(ind, td.firstChild);
      row._indicator = ind;
      const badge = document.createElement('span');
      badge.style.cssText = 'display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:#222;color:#666;margin-left:8px;vertical-align:middle;text-transform:uppercase;font-weight:500;';
      if (ext === 'm4a') { badge.style.background = 'rgba(199,120,221,0.15)'; badge.style.color = '#c778dd'; }
      badge.textContent = ext;
      td.appendChild(badge);
    }
    const qi = queue.length;
    queue.push({ href, name, row });
    row.style.cursor = 'pointer';
    row.addEventListener('click', e => {
      const a = e.target.closest('a');
      if (a) e.preventDefault();
      playTrack(qi);
    });
  });
  shuffleOrder = [...Array(queue.length).keys()];
  updateCount();
}

function updateCount() {
  const visible = queue.filter(t => !t.row.classList.contains('hidden-row')).length;
  const total = queue.length;
  searchCount.textContent = searchInput.value ? `${visible} of ${total} tracks` : `${total} tracks`;
}

function filterTracks(val) {
  const q = val.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  document.querySelectorAll('tbody tr').forEach(row => {
    const link = row.querySelector('a');
    if (!link) return;
    const name = link.textContent.trim().toLowerCase();
    row.classList.toggle('hidden-row', q && !name.includes(q));
  });
  updateCount();
}

function clearSearch() {
  searchInput.value = '';
  filterTracks('');
  searchInput.focus();
}

const TRANSCODE_EXTS = ['m4a', 'aac', 'wma', 'aiff', 'alac'];

function getPlayUrl(href, ext) {
  if (!TRANSCODE_EXTS.includes(ext)) return href;
  const base = window.location.pathname.replace(/\/$/, '');
  const filename = href.replace(/^.*\//, '');
  const fullPath = (base + '/' + filename).replace(/^\/Music\/Music/, '');
  return '/transcode' + fullPath;
}

function playTrack(qi) {
  if (qi < 0 || qi >= queue.length) return;
  const prev = queue[currentIndex];
  if (prev) {
    prev.row.classList.remove('active-track');
    if (prev.row._indicator) prev.row._indicator.style.opacity = '0';
  }
  currentIndex = qi;
  const track = queue[qi];
  const ext = getExt(track.name);
  const playUrl = getPlayUrl(track.href, ext);
  audio.src = playUrl;
  audio.play();
  player.classList.remove('hidden');
  track.row.classList.add('active-track');
  if (track.row._indicator) track.row._indicator.style.opacity = '1';
  playerTitle.textContent = track.name.replace(/\.[^.]+$/, '');
  playerMeta.innerHTML = ext === 'm4a'
    ? '<span class="atmos-tag">M4A · Transcoding to MP3</span>'
    : ext.toUpperCase();
  track.row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function togglePlay() {
  if (audio.paused) audio.play(); else audio.pause();
}
function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const ni = shuffle ? shuf(-1) : currentIndex - 1;
  if (ni >= 0) playTrack(ni);
}
function nextTrack() {
  if (repeat) { audio.currentTime = 0; audio.play(); return; }
  const ni = shuffle ? shuf(1) : currentIndex + 1;
  if (ni < queue.length) playTrack(ni); else setPlayIcon(false);
}
function shuf(dir) {
  const pos = shuffleOrder.indexOf(currentIndex);
  return shuffleOrder[(pos + dir + shuffleOrder.length) % shuffleOrder.length];
}
function toggleShuffle() {
  shuffle = !shuffle;
  btnShuffle.classList.toggle('active', shuffle);
  if (shuffle) for (let i = shuffleOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
  }
}
function toggleRepeat() {
  repeat = !repeat;
  btnRepeat.classList.toggle('active', repeat);
}
function seekTo(e) {
  const r = document.getElementById('progress-wrap').getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}
function setVolume(v) { audio.volume = v; }

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeCur.textContent = fmtTime(audio.currentTime);
  timeDur.textContent = fmtTime(audio.duration);
});
audio.addEventListener('ended', nextTrack);
audio.addEventListener('pause', () => setPlayIcon(false));
audio.addEventListener('play', () => setPlayIcon(true));

document.addEventListener('DOMContentLoaded', buildQueue);
</script>
</body>
</html>
