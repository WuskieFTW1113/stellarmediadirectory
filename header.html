<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8e8;
    --muted: #888;
    --accent: #c778dd;
    --accent2: #9b59b6;
    --row-hover: rgba(199,120,221,0.08);
    --active-row: rgba(199,120,221,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    padding-bottom: 120px;
  }
  h1.page-title {
    padding: 1.5rem 1.5rem 0.5rem;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .breadcrumb {
    padding: 0 1.5rem 1rem;
    font-size: 12px;
    color: var(--muted);
  }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  #fancy-listing { padding: 0 1rem 1rem; }

  table { width: 100%; border-collapse: collapse; }
  thead tr {
    border-bottom: 0.5px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  thead th { padding: 8px 12px; font-weight: 500; text-align: left; }
  tbody tr {
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.active-track { background: var(--active-row); }
  tbody td { padding: 10px 12px; }
  tbody td a {
    color: var(--text);
    text-decoration: none;
  }
  tbody td a:hover { color: var(--accent); }
  .file-icon { margin-right: 8px; opacity: 0.5; font-size: 13px; }
  .ext-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--muted);
    margin-left: 8px;
    vertical-align: middle;
    text-transform: uppercase;
  }
  .ext-badge.atmos { background: rgba(199,120,221,0.2); color: var(--accent); }
  .playing-indicator {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 8px;
    vertical-align: middle;
    opacity: 0;
  }
  .playing-indicator.active { opacity: 1; animation: pulse 1s ease infinite alternate; }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

  #player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: rgba(15,15,15,0.97);
    border-top: 0.5px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    z-index: 1000;
  }
  #player.hidden { display: none; }

  .player-info {
    min-width: 200px;
    max-width: 240px;
    overflow: hidden;
  }
  .player-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .player-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .player-meta .atmos-tag {
    color: var(--accent);
    font-weight: 500;
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .ctrl-btn:hover { color: var(--text); background: var(--bg3); }
  .ctrl-btn.play-btn {
    background: var(--accent);
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 16px;
  }
  .ctrl-btn.play-btn:hover { background: var(--accent2); }
  .ctrl-btn.active { color: var(--accent); }

  .player-progress {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .progress-bar-wrap {
    position: relative;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    cursor: pointer;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }
  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .volume-wrap input[type=range] {
    width: 80px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .vol-icon { color: var(--muted); font-size: 16px; }

  audio { display: none; }

  @media (max-width: 600px) {
    .player-info { min-width: 120px; max-width: 140px; }
    .volume-wrap { display: none; }
  }
  #search-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(8px);
    padding: 12px 1.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
    display: flex;
    align-items: center;
  }
  #search-icon {
    position: absolute;
    left: 12px;
    width: 16px;
    height: 16px;
    color: #666;
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    background: #1c1c1c;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 13px;
    padding: 8px 36px 8px 38px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: rgba(199,120,221,0.5); }
  #search-input::placeholder { color: #555; }
  #search-clear {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    display: none;
    line-height: 1;
  }
  #search-clear:hover { color: #aaa; }
  #search-count { font-size: 12px; color: #555; white-space: nowrap; }
  tr.hidden-row { display: none; }
</style>
</head>
<body>
<div id="search-bar">
  <div id="search-wrap">
    <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search tracks..." autocomplete="off" spellcheck="false" oninput="filterTracks(this.value)" />
    <button id="search-clear" onclick="clearSearch()" aria-label="Clear search">✕</button>
  </div>
  <span id="search-count"></span>
</div>
